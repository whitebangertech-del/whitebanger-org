<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fee Payment — Student Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="erp-style.css"/>
</head>
<body>
<div class="erp-layout">
  <aside class="erp-sidebar" id="erp-sidebar">
    <div class="erp-sidebar-brand"><div class="erp-brand-logo">WB</div><div class="erp-brand-text"><strong>White Banger</strong><span>Student Portal</span></div></div>
    <nav class="erp-sidebar-nav">
      <div class="erp-nav-section"><div class="erp-nav-label">Main</div><a href="student-dashboard.html" class="erp-nav-link"><span class="erp-nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/></svg></span><span class="erp-nav-text">Dashboard</span></a></div>
      <div class="erp-nav-section"><div class="erp-nav-label">Finance</div>
        <a href="student-fee-payment.html" class="erp-nav-link active"><span class="erp-nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg></span><span class="erp-nav-text">Fee Payments</span></a>
      </div>
    </nav>
    <div class="erp-sidebar-footer"><div class="erp-sidebar-user"><div class="erp-user-avatar" id="user-avatar">ST</div><div class="erp-user-info"><strong id="user-name">Student</strong><span>Student</span></div></div></div>
  </aside>

  <div class="erp-main" id="erp-main">
    <div class="erp-overlay-drop"></div>
    <header class="erp-topbar">
      <button class="erp-topbar-toggle" id="erp-sidebar-toggle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <h1 class="erp-topbar-title">Fee Payments</h1>
      <div class="erp-topbar-actions">
        <button class="erp-topbar-btn" id="erp-theme-toggle" onclick="ERPTheme.toggle()"></button>
        <button class="erp-topbar-btn" onclick="ERPAuth.logout()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
      </div>
    </header>

    <div class="erp-content">

      <!-- Fee Summary -->
      <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 24px">
        <div class="erp-stat-card">
          <div class="erp-stat-value" id="total-fee">₹0</div>
          <div class="erp-stat-label">Total Fee</div>
        </div>
        <div class="erp-stat-card">
          <div class="erp-stat-value" id="paid-amount">₹0</div>
          <div class="erp-stat-label">Paid Amount</div>
        </div>
        <div class="erp-stat-card">
          <div class="erp-stat-value" id="balance-amount" style="color: var(--danger)">₹0</div>
          <div class="erp-stat-label">Balance Due</div>
        </div>
      </div>

      <!-- Make Payment -->
      <div class="erp-card" style="margin-bottom: 24px" id="payment-card">
        <div class="erp-card-header"><span class="erp-card-title">💳 Make Payment</span></div>
        <div class="erp-card-body">
          <form id="payment-form">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px">
              <div class="erp-form-group">
                <label class="erp-form-label">Payment Type *</label>
                <select id="payment-type" class="erp-form-input" required>
                  <option value="tuition">Tuition Fee</option>
                  <option value="exam">Exam Fee</option>
                  <option value="library">Library Fee</option>
                  <option value="other">Other</option>
                </select>
              </div>
              <div class="erp-form-group">
                <label class="erp-form-label">Amount (₹) *</label>
                <input type="number" id="payment-amount" class="erp-form-input" min="1" required/>
              </div>
              <div class="erp-form-group">
                <label class="erp-form-label">Payment Method *</label>
                <select id="payment-method" class="erp-form-input" required>
                  <option value="upi">UPI</option>
                  <option value="card">Card</option>
                  <option value="netbanking">Net Banking</option>
                  <option value="wallet">Wallet</option>
                </select>
              </div>
              <div class="erp-form-group">
                <label class="erp-form-label">Reference/Notes</label>
                <input type="text" id="payment-notes" class="erp-form-input" placeholder="Optional"/>
              </div>
            </div>
            <button type="submit" class="erp-btn erp-btn-primary" style="margin-top: 16px">Proceed to Payment</button>
          </form>
        </div>
      </div>

      <!-- Payment History -->
      <div class="erp-card">
        <div class="erp-card-header"><span class="erp-card-title">💰 Payment History</span></div>
        <div class="erp-card-body" style="padding: 0">
          <div class="erp-table-responsive">
            <table class="erp-table">
              <thead>
                <tr>
                  <th>Transaction ID</th>
                  <th>Type</th>
                  <th>Amount</th>
                  <th>Method</th>
                  <th>Status</th>
                  <th>Date</th>
                  <th>Receipt</th>
                </tr>
              </thead>
              <tbody id="payment-history"></tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Payment Success Modal -->
<div class="erp-modal-overlay" id="payment-success-modal">
  <div class="erp-modal-content" style="max-width: 500px; text-align: center">
    <div class="erp-modal-body">
      <div style="font-size: 64px; margin-bottom: 16px">✅</div>
      <h2 style="font-size: 24px; font-weight: 700; margin-bottom: 8px; color: var(--success)">Payment Successful!</h2>
      <p style="color: var(--text-muted); margin-bottom: 24px">Your payment has been processed successfully</p>
      <div id="payment-receipt" style="background: var(--gray-50); padding: 20px; border-radius: 8px; margin-bottom: 24px; text-align: left"></div>
      <button class="erp-btn erp-btn-primary" onclick="closePaymentSuccess()">Done</button>
    </div>
  </div>
</div>

<div id="erp-toast-container"></div>

<script src="erp-data.js"></script>
<script src="erp-script.js"></script>
<script>
  const currentUser = ERPAuth.guard('student');
  ERPTheme.init();
  ERPSidebar.init();

  if (currentUser) {
    document.getElementById('user-name').textContent = currentUser.name;
    document.getElementById('user-avatar').textContent = currentUser.avatar;
  }

  const student = ERP_DATA.students.find(s => s.id === currentUser.id);
  let payments = [];

  function loadFeeInfo() {
    // TODO: Replace with Supabase query
    // const { data, error } = await supabase
    //   .from('payments')
    //   .select('*')
    //   .eq('student_id', currentUser.id);

    const allPayments = JSON.parse(localStorage.getItem('payments') || '[]');
    payments = allPayments.filter(p => p.studentId === currentUser.id && p.status === 'success');

    const totalFee = student.fee || 50000;
    const paidAmount = payments.reduce((sum, p) => sum + p.amount, 0);
    const balance = totalFee - paidAmount;

    document.getElementById('total-fee').textContent = '₹' + totalFee.toLocaleString('en-IN');
    document.getElementById('paid-amount').textContent = '₹' + paidAmount.toLocaleString('en-IN');
    document.getElementById('balance-amount').textContent = '₹' + balance.toLocaleString('en-IN');

    // Hide payment card if fully paid
    if (balance <= 0) {
      document.getElementById('payment-card').innerHTML = `
        <div class="erp-card-header"><span class="erp-card-title">✅ All Fees Paid</span></div>
        <div class="erp-card-body">
          <div style="text-align: center; padding: 40px; color: var(--success)">
            <div style="font-size: 64px; margin-bottom: 16px">🎉</div>
            <h3 style="font-size: 20px; margin-bottom: 8px">Congratulations!</h3>
            <p style="color: var(--text-muted)">You have paid all your fees. No pending payments.</p>
          </div>
        </div>
      `;
    }

    loadPaymentHistory();
  }

  function loadPaymentHistory() {
    const tbody = document.getElementById('payment-history');

    if (payments.length === 0) {
      tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 40px; color: var(--text-muted)">No payments made yet</td></tr>';
      return;
    }

    tbody.innerHTML = payments.slice().reverse().map(p => {
      const statusColor = p.status === 'success' ? 'var(--success)' : (p.status === 'failed' ? 'var(--danger)' : 'var(--warning)');

      return `
        <tr>
          <td><strong>${p.transactionId}</strong></td>
          <td><span class="erp-badge">${p.type.toUpperCase()}</span></td>
          <td><strong>₹${p.amount.toLocaleString('en-IN')}</strong></td>
          <td>${p.method.toUpperCase()}</td>
          <td><span class="erp-badge" style="background: ${statusColor}20; color: ${statusColor}">${p.status.toUpperCase()}</span></td>
          <td>${new Date(p.date).toLocaleDateString('en-IN')}</td>
          <td>
            <button class="erp-btn erp-btn-sm erp-btn-ghost" onclick='viewReceipt(${JSON.stringify(p)})' title="View Receipt">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 14px"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </td>
        </tr>
      `;
    }).join('');
  }

  document.getElementById('payment-form').addEventListener('submit', async (e) => {
    e.preventDefault();

    const paymentData = {
      transactionId: 'TXN' + Date.now(),
      studentId: currentUser.id,
      type: document.getElementById('payment-type').value,
      amount: parseFloat(document.getElementById('payment-amount').value),
      method: document.getElementById('payment-method').value,
      notes: document.getElementById('payment-notes').value,
      status: 'success',
      date: new Date().toISOString()
    };

    // TODO: Integrate Razorpay/Stripe payment gateway
    // Simulate payment processing
    await new Promise(resolve => setTimeout(resolve, 1500));

    const allPayments = JSON.parse(localStorage.getItem('payments') || '[]');
    allPayments.push(paymentData);
    localStorage.setItem('payments', JSON.stringify(allPayments));

    showPaymentSuccess(paymentData);
    e.target.reset();
    loadFeeInfo();
  });

  function showPaymentSuccess(payment) {
    const receipt = document.getElementById('payment-receipt');
    receipt.innerHTML = `
      <div style="margin-bottom: 8px"><strong>Transaction ID:</strong> ${payment.transactionId}</div>
      <div style="margin-bottom: 8px"><strong>Student:</strong> ${student.name}</div>
      <div style="margin-bottom: 8px"><strong>Type:</strong> ${payment.type.toUpperCase()}</div>
      <div style="margin-bottom: 8px"><strong>Amount:</strong> ₹${payment.amount.toLocaleString('en-IN')}</div>
      <div style="margin-bottom: 8px"><strong>Method:</strong> ${payment.method.toUpperCase()}</div>
      <div><strong>Date:</strong> ${new Date(payment.date).toLocaleString('en-IN')}</div>
    `;

    document.getElementById('payment-success-modal').classList.add('open');
  }

  function closePaymentSuccess() {
    document.getElementById('payment-success-modal').classList.remove('open');
  }

  function viewReceipt(payment) {
    showPaymentSuccess(payment);
  }

  loadFeeInfo();
</script>
</body>
</html>
