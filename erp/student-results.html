<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Results — Student Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="erp-style.css"/>
</head>
<body>
<div class="erp-layout">
  <aside class="erp-sidebar" id="erp-sidebar">
    <div class="erp-sidebar-brand"><div class="erp-brand-logo">WB</div><div class="erp-brand-text"><strong>White Banger</strong><span>Student Portal</span></div></div>
    <nav class="erp-sidebar-nav">
      <div class="erp-nav-section"><div class="erp-nav-label">Main</div><a href="student-dashboard.html" class="erp-nav-link"><span class="erp-nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/></svg></span><span class="erp-nav-text">Dashboard</span></a></div>
      <div class="erp-nav-section"><div class="erp-nav-label">My Documents</div>
        <a href="student-id-card.html" class="erp-nav-link"><span class="erp-nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="18" rx="2"/></svg></span><span class="erp-nav-text">My ID Card</span></a>
        <a href="student-admit-card.html" class="erp-nav-link"><span class="erp-nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/></svg></span><span class="erp-nav-text">Admit Card</span></a>
        <a href="student-results.html" class="erp-nav-link active"><span class="erp-nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/></svg></span><span class="erp-nav-text">My Results</span></a>
      </div>
    </nav>
    <div class="erp-sidebar-footer"><div class="erp-sidebar-user"><div class="erp-user-avatar" id="user-avatar">ST</div><div class="erp-user-info"><strong id="user-name">Student</strong><span>Student</span></div></div></div>
  </aside>

  <div class="erp-main" id="erp-main">
    <div class="erp-overlay-drop"></div>
    <header class="erp-topbar">
      <button class="erp-topbar-toggle" id="erp-sidebar-toggle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <h1 class="erp-topbar-title">My Exam Results</h1>
      <div class="erp-topbar-actions">
        <button class="erp-topbar-btn" id="erp-theme-toggle" onclick="ERPTheme.toggle()"></button>
        <button class="erp-topbar-btn" onclick="ERPAuth.logout()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
      </div>
    </header>

    <div class="erp-content">

      <!-- Performance Overview -->
      <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 24px">
        <div class="erp-stat-card">
          <div class="erp-stat-value" id="total-exams">0</div>
          <div class="erp-stat-label">Total Exams</div>
        </div>
        <div class="erp-stat-card">
          <div class="erp-stat-value" id="avg-percentage">0%</div>
          <div class="erp-stat-label">Average %</div>
        </div>
        <div class="erp-stat-card">
          <div class="erp-stat-value" id="pass-count">0</div>
          <div class="erp-stat-label">Passed</div>
        </div>
        <div class="erp-stat-card">
          <div class="erp-stat-value" id="fail-count">0</div>
          <div class="erp-stat-label">Failed</div>
        </div>
      </div>

      <!-- Results Table -->
      <div class="erp-card">
        <div class="erp-card-header"><span class="erp-card-title">📊 My Results</span></div>
        <div class="erp-card-body" style="padding: 0">
          <div class="erp-table-responsive">
            <table class="erp-table">
              <thead>
                <tr>
                  <th>Exam Name</th>
                  <th>Date</th>
                  <th>Marks Obtained</th>
                  <th>Total Marks</th>
                  <th>Percentage</th>
                  <th>Grade</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="results-list"></tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Marksheet Modal -->
<div class="erp-modal-overlay" id="marksheet-modal">
  <div class="erp-modal-content" style="max-width: 700px">
    <div class="erp-modal-header">
      <h2 class="erp-modal-title">Detailed Marksheet</h2>
      <button class="erp-modal-close" onclick="closeMarksheet()">&times;</button>
    </div>
    <div class="erp-modal-body" id="marksheet-content"></div>
  </div>
</div>

<div id="erp-toast-container"></div>

<script src="erp-data.js"></script>
<script src="erp-script.js"></script>
<script>
  const currentUser = ERPAuth.guard('student');
  ERPTheme.init();
  ERPSidebar.init();

  if (currentUser) {
    document.getElementById('user-name').textContent = currentUser.name;
    document.getElementById('user-avatar').textContent = currentUser.avatar;
  }

  const student = ERP_DATA.students.find(s => s.id === currentUser.id);

  function calculateGrade(percentage) {
    if (percentage >= 90) return { grade: 'A+', color: '#10b981' };
    if (percentage >= 80) return { grade: 'A', color: '#10b981' };
    if (percentage >= 70) return { grade: 'B+', color: '#3b82f6' };
    if (percentage >= 60) return { grade: 'B', color: '#3b82f6' };
    if (percentage >= 50) return { grade: 'C', color: '#f59e0b' };
    if (percentage >= 40) return { grade: 'D', color: '#f59e0b' };
    return { grade: 'F', color: '#ef4444' };
  }

  function loadResults() {
    // TODO: Replace with Supabase query
    // const { data: results, error } = await supabase
    //   .from('exam_results')
    //   .select('*, exams(*)')
    //   .eq('student_id', currentUser.id);

    const allResults = JSON.parse(localStorage.getItem('exam_results') || '[]');
    const myResults = allResults.filter(r => r.studentId === currentUser.id);

    // Update stats
    document.getElementById('total-exams').textContent = myResults.length;

    if (myResults.length > 0) {
      const totalPercentage = myResults.reduce((sum, r) => sum + (r.marks / r.totalMarks * 100), 0);
      const avgPercentage = (totalPercentage / myResults.length).toFixed(2);
      document.getElementById('avg-percentage').textContent = avgPercentage + '%';

      const passCount = myResults.filter(r => (r.marks / r.totalMarks * 100) >= 40).length;
      document.getElementById('pass-count').textContent = passCount;
      document.getElementById('fail-count').textContent = myResults.length - passCount;
    }

    // Load table
    const tbody = document.getElementById('results-list');

    if (myResults.length === 0) {
      tbody.innerHTML = '<tr><td colspan="8" style="text-align: center; padding: 40px; color: var(--text-muted)">No results available yet</td></tr>';
      return;
    }

    tbody.innerHTML = myResults.map(r => {
      const exam = ERP_DATA.exams.find(e => e.id === r.examId);
      const percentage = (r.marks / r.totalMarks * 100).toFixed(2);
      const gradeInfo = calculateGrade(percentage);
      const status = percentage >= 40 ? 'pass' : 'fail';

      return `
        <tr>
          <td><strong>${exam?.name || r.examId}</strong></td>
          <td>${exam?.date ? new Date(exam.date).toLocaleDateString('en-IN') : '-'}</td>
          <td><strong>${r.marks}</strong></td>
          <td>${r.totalMarks}</td>
          <td><strong>${percentage}%</strong></td>
          <td><span class="erp-badge" style="background: ${gradeInfo.color}20; color: ${gradeInfo.color}">${gradeInfo.grade}</span></td>
          <td><span class="erp-badge" style="background: ${status === 'pass' ? 'var(--success)' : 'var(--danger)'}20; color: ${status === 'pass' ? 'var(--success)' : 'var(--danger)'}">status.toUpperCase()}</span></td>
          <td>
            <button class="erp-btn erp-btn-sm erp-btn-ghost" onclick='viewMarksheet(${JSON.stringify(r)})' title="View Marksheet">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 14px"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </td>
        </tr>
      `;
    }).join('');
  }

  function viewMarksheet(result) {
    const exam = ERP_DATA.exams.find(e => e.id === result.examId);
    const percentage = (result.marks / result.totalMarks * 100).toFixed(2);
    const gradeInfo = calculateGrade(percentage);
    const status = percentage >= 40 ? 'PASS' : 'FAIL';

    const content = document.getElementById('marksheet-content');
    content.innerHTML = `
      <div style="border: 2px solid var(--primary); padding: 30px; border-radius: 8px">
        <div style="text-align: center; border-bottom: 2px solid var(--border); padding-bottom: 16px; margin-bottom: 24px">
          <h2 style="color: var(--primary); margin: 0; font-size: 24px">WHITE BANGER</h2>
          <p style="margin: 4px 0 0; font-size: 14px; color: var(--text-muted)">Marksheet</p>
        </div>

        <div style="margin-bottom: 24px">
          <table style="width: 100%; border-collapse: collapse">
            <tr style="border-bottom: 1px solid var(--border)">
              <td style="padding: 12px 0; font-weight: 600; width: 40%">Student Name:</td>
              <td style="padding: 12px 0">${student.name}</td>
            </tr>
            <tr style="border-bottom: 1px solid var(--border)">
              <td style="padding: 12px 0; font-weight: 600">Roll Number:</td>
              <td style="padding: 12px 0">${student.id}</td>
            </tr>
            <tr style="border-bottom: 1px solid var(--border)">
              <td style="padding: 12px 0; font-weight: 600">Course:</td>
              <td style="padding: 12px 0">${student.course}</td>
            </tr>
            <tr>
              <td style="padding: 12px 0; font-weight: 600">Exam:</td>
              <td style="padding: 12px 0">${exam?.name || result.examId}</td>
            </tr>
          </table>
        </div>

        <div style="background: var(--gray-50); padding: 20px; border-radius: 8px; margin-bottom: 24px">
          <h3 style="margin: 0 0 16px; font-size: 16px; font-weight: 700">Performance</h3>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px">
            <div>
              <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 4px">Marks Obtained</div>
              <div style="font-size: 24px; font-weight: 700; color: var(--primary)">${result.marks} / ${result.totalMarks}</div>
            </div>
            <div>
              <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 4px">Percentage</div>
              <div style="font-size: 24px; font-weight: 700; color: var(--primary)">${percentage}%</div>
            </div>
            <div>
              <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 4px">Grade</div>
              <div style="font-size: 24px; font-weight: 700; color: ${gradeInfo.color}">${gradeInfo.grade}</div>
            </div>
            <div>
              <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 4px">Result</div>
              <div style="font-size: 24px; font-weight: 700; color: ${status === 'PASS' ? 'var(--success)' : 'var(--danger)'}">status}</div>
            </div>
          </div>
        </div>

        <div style="text-align: right; padding-top: 16px; border-top: 2px solid var(--border)">
          <div style="display: inline-block; text-align: center">
            <div style="border-top: 2px solid var(--text-primary); padding-top: 8px; min-width: 200px; margin-top: 40px">Principal's Signature</div>
          </div>
        </div>

        <div style="text-align: center; margin-top: 20px; font-size: 12px; color: var(--text-muted)">
          Generated on ${new Date().toLocaleDateString('en-IN', { year: 'numeric', month: 'long', day: 'numeric' })}
        </div>
      </div>
    `;

    document.getElementById('marksheet-modal').classList.add('open');
  }

  function closeMarksheet() {
    document.getElementById('marksheet-modal').classList.remove('open');
  }

  loadResults();
</script>
</body>
</html>
