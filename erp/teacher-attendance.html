<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mark Attendance — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="erp-style.css"/>
</head>
<body>
<div class="erp-layout">
  <aside class="erp-sidebar" id="erp-sidebar">
    <div class="erp-sidebar-brand"><div class="erp-brand-logo">WB</div><div class="erp-brand-text"><strong>White Banger</strong><span>Management System</span></div></div>
    <nav class="erp-sidebar-nav"><div class="erp-nav-section">
      <a href="teacher-dashboard.html" class="erp-nav-link"><span class="erp-nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></span><span class="erp-nav-text">Dashboard</span></a>
      <a href="teacher-attendance.html" class="erp-nav-link active"><span class="erp-nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></span><span class="erp-nav-text">Mark Attendance</span></a>
      <a href="teacher-exams.html" class="erp-nav-link"><span class="erp-nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="2"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg></span><span class="erp-nav-text">Manage Exams</span></a>
      <a href="teacher-materials.html" class="erp-nav-link"><span class="erp-nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg></span><span class="erp-nav-text">Materials</span></a>
      <a href="teacher-students.html" class="erp-nav-link"><span class="erp-nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg></span><span class="erp-nav-text">My Students</span></a>
    </div></nav>
    <div class="erp-sidebar-footer"><div class="erp-sidebar-user"><div class="erp-user-avatar">RK</div><div class="erp-user-info"><strong>Ravi Kumar</strong><span>Teacher</span></div></div></div>
  </aside>
  <div class="erp-main" id="erp-main">
    <header class="erp-topbar">
      <button class="erp-topbar-toggle" id="erp-sidebar-toggle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <div class="erp-breadcrumb"><span>Dashboard</span><span>›</span><strong>Mark Attendance</strong></div>
      <div class="erp-topbar-actions">
        <span class="erp-role-badge teacher">Teacher</span>
        <button class="erp-topbar-btn" id="erp-theme-toggle" title="Toggle Theme"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/></svg></button>
        <div class="erp-topbar-avatar">RK</div>
        <button class="erp-btn erp-btn-ghost erp-btn-sm" data-action="logout">Logout</button>
      </div>
    </header>
    <div class="erp-content">
      <div class="erp-page-header">
        <div><h1 class="erp-page-title">✅ Mark Attendance</h1><p class="erp-page-subtitle">Mark attendance for your class — today's record</p></div>
        <div id="date-display" style="font-weight:700;color:var(--primary);font-size:16px"></div>
      </div>
      <!-- Course selector -->
      <div class="erp-card" style="margin-bottom:20px;padding:20px">
        <div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap">
          <div style="flex:1;min-width:200px">
            <label class="erp-label erp-mb-8">Select Course</label>
            <select class="erp-select" id="att-course" onchange="loadStudents()"></select>
          </div>
          <div style="flex:0">
            <label class="erp-label erp-mb-8">Actions</label>
            <div style="display:flex;gap:8px">
              <button class="erp-btn erp-btn-outline erp-btn-sm" onclick="markAll('present')">✅ All Present</button>
              <button class="erp-btn erp-btn-danger erp-btn-sm" onclick="markAll('absent')">❌ All Absent</button>
            </div>
          </div>
        </div>
      </div>
      <!-- Attendance Cards -->
      <div id="att-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;margin-bottom:24px"></div>
      <!-- Submit -->
      <div style="text-align:center">
        <button class="erp-btn erp-btn-primary" style="padding:14px 48px;font-size:16px" onclick="submitAttendance()">📤 Submit Attendance</button>
      </div>
    </div>
  </div>
</div>
<div class="erp-overlay-drop" id="erp-overlay"></div>
<script src="erp-data.js"></script><script src="erp-script.js"></script>
<script>
  ERPAuth.guard('teacher');
  const now = new Date();
  document.getElementById('date-display').textContent = now.toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const teacher = ERP_DATA.teachers[0];
  let attendance = {};

  // Populate courses
  const sel = document.getElementById('att-course');
  teacher.courses.forEach(c => { const o=document.createElement('option'); o.value=c; o.textContent=c; sel.appendChild(o); });

  function loadStudents() {
    const course = document.getElementById('att-course').value;
    const students = ERP_DATA.students.filter(s=>s.course===course);
    attendance = {};
    students.forEach(s => attendance[s.id] = 'present');
    document.getElementById('att-grid').innerHTML = students.map(s=>`
      <div class="erp-card" style="padding:16px;text-align:center" id="att-card-${s.id}">
        <div class="erp-avatar erp-avatar-lg" style="background:${ERPTable.avatarBg(s.photo)};margin:0 auto 12px">${s.photo}</div>
        <div style="font-weight:700;font-size:14px;margin-bottom:2px">${s.name}</div>
        <div style="font-size:11px;color:var(--text-muted);margin-bottom:16px">Overall: ${s.attendance}%</div>
        <div style="display:flex;gap:8px;justify-content:center">
          <button class="erp-btn erp-btn-success erp-btn-sm att-btn${s.id}-active" style="flex:1" onclick="setAtt('${s.id}','present')">✅ Present</button>
          <button class="erp-btn erp-btn-ghost erp-btn-sm" onclick="setAtt('${s.id}','late')">⏰ Late</button>
          <button class="erp-btn erp-btn-ghost erp-btn-sm" onclick="setAtt('${s.id}','absent')">❌</button>
        </div>
      </div>`).join('');
  }

  function setAtt(id, status) {
    attendance[id] = status;
    const card = document.getElementById('att-card-'+id);
    if(!card) return;
    const color = status==='present'?'#10b981':status==='late'?'#f59e0b':'#ef4444';
    card.style.borderColor = color;
    card.style.background = color+'11';
    ERPToast.show(id.split('STU')[1],`Marked as ${status}`,'info',1000);
  }
  function markAll(status) {
    Object.keys(attendance).forEach(id=>setAtt(id,status));
  }
  function submitAttendance() {
    const count = Object.values(attendance);
    if(!count.length) { ERPToast.show('Error','Please select a course first.','error'); return; }
    const presents = count.filter(v=>v==='present').length;
    ERPToast.show('Submitted!',`Attendance saved: ${presents}/${count.length} present.`,'success');
    setTimeout(()=>window.location.href='teacher-dashboard.html', 1500);
  }
  loadStudents();
</script>
</body>
</html>
